<!DOCTYPE html>
<html>
<head>
   <link rel="stylesheet" href="style.css"> 
</head>
<body>
  <script src="main.js"></script>
  <div class="cover" id="cover"></div>

  <h1>Pomodoro Timer</h1>

  <button class="settings-button" onclick="openSettings()">Settings</button><br><br><br><br> <!-- not neat -->

   <hr>

  <div class="settings-popup" id="mySettings">
    <div class="settings-container">
      <button class="x-button" onclick="closeSettings()"></button><br>
      <h2>Settings</h2>
      <label for="pomodoro">Pomodoro:</label><br>
      <input type="number" id="pomodoro" min="1" max="8640" value="25"><br><br>
      <label for="short break">Short Break:</label><br>
      <input type="number" id="short break" min="1" max="8640" value="5"><br><br>
      <label for="long break">Long Break:</label><br>
      <input type="number" id="long break" min="1" max="8640" value="15"><br><br>
      <button class="ok-button" onclick="setTimer()">OK</button>
    </div>
  </div>

  <div class="timer" id="timer">00:25:00</div>

  <button class="start-button" onclick="myVar = setInterval(updateTimer, 1000)">Start</button>

  <button class="pause-button" onclick="clearInterval(myVar)">Pause</button>

  </body>
</html>
