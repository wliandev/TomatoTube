<!DOCTYPE html>
<html>
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css"> 
  <script src="main.js"></script>

</head>
<body>

  <div class="container-fluid">
    <div class="row">

      <div class="col-6"> 
        <h1>TomatoTube</h1>
      </div>

      <div class="col-6"> 
        <button class="settings-button" data-bs-toggle="modal" data-bs-target="#myModal">Settings</button>

        <div class="modal fade" id="myModal">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h4 class="modal-title">Settings</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <label for="pomodoro">Pomodoro:</label><br>
                <input type="number" id="pomodoro" min="1" max="8640" value="25"><br><br>
                <label for="short break">Short Break:</label><br>
                <input type="number" id="short break" min="1" max="8640" value="5"><br><br>
                <label for="long break">Long Break:</label><br>
                <input type="number" id="long break" min="1" max="8640" value="15"><br><br>
                <label for="interval">Long Break Interval:</label><br>
                <input type="number" id="interval" min="1" max="99" value="3"><br><br>
              </div>
              <div class="modal-footer">
                <button type="button" class="ok-button" onclick="setTimer()" data-bs-dismiss="modal">OK</button>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

    <div class="col-lg-6 p-0">

    </div>
    <div class="col-lg-6 p-0">

    </div>
  </div> -->

  <hr><br>

  <div class="status" id="status">Pomodoro</div>
  <div class="timer" id="timer">00:25:00</div>
  <button class="skip-button" id="back" onclick="goBack()"><</button>
  <button class="start-button" id="start" onclick="startTimer()">Start</button>
  <button class="skip-button" id="skip" onclick="skipForward()">></button>
  <div class="progress">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  </body>
</html>
